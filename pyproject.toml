[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dhis2-client"
version = "0.1.0"
description = "Async DHIS2 Web API client with Pydantic v2 and structured logging"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "dhis2-client" }]
keywords = ["dhis2", "async", "httpx", "pydantic"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
