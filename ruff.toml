# ruff.toml
target-version = "py38"
line-length = 120

[lint]
select = [
  "E",    # pycodestyle
  "F",    # pyflakes
  "W",    # warnings
  "I",    # isort
  "B",    # bugbear
  "N",    # pep8-naming
  "UP",   # pyupgrade (we'll ignore unsafe ones below)
]
ignore = [
  "E203",   # whitespace around ':'
  "UP006",  # prefer builtins (list/dict) — not safe on py38 without heavy changes
  "UP007",  # | unions — not safe on py38
  "N815",   # DHIS2 JSON uses mixedCase keys/attrs by design
  "E203",   # allow black-compatible slicing whitespace if you use black later
]

# Let Ruff fix what it can
fixable = ["ALL"]

# Keep import sorting on
extend-select = ["I"]

[lint.per-file-ignores]
# Tests often have long strings/URLs; relax line length and compact asserts there
"tests/**/*.py" = ["E501"]
"src/dhis2_client/cli/app.py" = ["B008"]
